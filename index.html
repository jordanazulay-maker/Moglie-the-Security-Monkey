<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <style>
        body {
            background-color: #f4f4f9;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            height: 100vh;
            margin: 0;
            text-align: center;
            position: relative; 
            overflow: hidden; 
        }

        .container {
            padding-top: 120px;
            z-index: 20; 
        }

        h1 { font-size: 3.5rem; margin-bottom: 10px; }
        p { font-size: 1.8rem; color: #666; }

        /* The Bubble Box */
        .speech-bubble {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px 25px;
            position: relative;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            border: 2px solid #000;
            display: inline-block;
        }

        /* The Triangle Tail */
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #ffffff transparent transparent;
        }
        
        /* The Tail Outline */
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 17px 17px 0;
            border-style: solid;
            border-color: #000 transparent transparent;
        }

        .monkey-bottom {
            width: 300px; 
            position: absolute;
            bottom: -10px; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 10;
        }

        .monkey-bottom img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>403 - Forbidden</h1>
        <p>Sorry, you're not allowed here!</p>
    </div>

    <div class="monkey-bottom">
        <div class="speech-bubble">Looks like this primate doesn't think you have clearance to pass. Slip this monkey a secret banana for access.</div>
        <img src="monkey.svg" alt="Monkey Mascot">
    </div>

</body>
</html>

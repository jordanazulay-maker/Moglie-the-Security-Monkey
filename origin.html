<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Down - Origin DNS Error</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 40px 20px;
            z-index: 2;
        }

        .status-badge {
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0;
            color: #d9534f;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 40px;
        }

        /* --- Content Layout --- */
        .content-flex {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            margin-top: 20px;
        }

        .monkey-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .speech-bubble {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px 30px;
            position: relative;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            border: 2px solid #000;
            max-width: 400px;
            line-height: 1.4;
        }

        .speech-bubble::after, .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-style: solid;
        }

        .speech-bubble::after {
            border-width: 15px 15px 0;
            border-color: #ffffff transparent transparent;
            z-index: 2;
        }

        .speech-bubble::before {
            bottom: -18px;
            border-width: 17px 17px 0;
            border-color: #000 transparent transparent;
            z-index: 1;
        }

        .mascot {
            width: 280px;
            height: auto;
            transition: transform 0.3s ease;
        }

        /* --- Banana Styling --- */
        .banana-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .banana-button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s;
        }

        .banana-button:hover {
            transform: scale(1.1) rotate(-10deg);
        }

        .banana-label {
            font-size: 0.9rem;
            font-style: italic;
            color: #555;
            margin-top: 15px;
            max-width: 120px;
        }

        /* --- Footer --- */
        .error-footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            width: 100%;
        }

        .error-code {
            font-size: 0.85rem;
            color: #adb5bd;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .content-flex {
                flex-direction: column;
                gap: 40px;
            }
            h1 { font-size: 2.5rem; }
            .mascot { width: 220px; }
            .speech-bubble { width: 85%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">Access Denied</div>
        <h1>Origin DNS Error</h1>
        <p class="subtitle">Sorry, the server is not reachable at the moment.</p>
        
        <div class="content-flex">
            <!-- Monkey Section -->
            <div class="monkey-wrapper">
                <div class="speech-bubble">
                    Our top primate is peeling back the layers of this monkey business. Thanks for your patience while we banana split this problem!
                </div>
                <img src="monkey.svg" 
                     alt="Monkey Mascot" 
                     class="mascot">
            </div>

            <!-- Banana Section -->
            <div class="banana-wrapper">
                <button class="banana-button" onclick="window.location.reload();">
                    <img src="banana.svg" 
                         width="100" 
                         height="100" 
                         alt="Banana">
                    <div class="banana-label">Feed the monkey a banana to retry</div>
                </button>
            </div>
        </div>

        <div class="error-footer">
            <div class="error-code">
                Cloudflare Event ID: <strong>::RAY_ID::</strong> • Status: 503<br>
                ::CLOUDFLARE_ERROR_1000S_BOX::
            </div>
        </div>
    </div>

</body>
</html>

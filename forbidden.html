<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link rel="icon" type="image/svg+xml" href="monkey.svg">
    <style>
        body {
            background-color: #f4f4f9;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            overflow-x: hidden;
        }

        .header-container {
            padding-top: 8vh;
            z-index: 20;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.8rem;
            color: #666;
        }

        .monkey-container {
            display: flex;
            flex: 1; /* Fills the middle space to center content vertically */
            justify-content: center;
            align-items: center; /* Centers monkey and banana vertically */
            gap: 50px;
            z-index: 10;
            padding: 20px;
        }

        .monkey-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .speech-bubble {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px 25px;
            position: relative;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            border: 2px solid #000;
            display: inline-block;
            max-width: 400px;
        }

        /* Speech bubble tail */
        .speech-bubble::after, .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-style: solid;
        }

        .speech-bubble::after {
            border-width: 15px 15px 0;
            border-color: #ffffff transparent transparent;
            z-index: 2;
        }

        .speech-bubble::before {
            bottom: -18px;
            border-width: 17px 17px 0;
            border-color: #000 transparent transparent;
            z-index: 1;
        }

        .monkey-bottom {
            width: 300px;
        }

        .monkey-bottom img {
            width: 100%;
            height: auto;
            display: block;
        }

        .banana-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .banana-button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s;
        }

        .banana-button:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        .banana-label {
            font-size: 0.9rem;
            font-style: italic;
            color: #555;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1.2rem; }
            .speech-bubble { font-size: 1rem; }
            .monkey-container { 
                flex-direction: column; 
                gap: 30px; 
            }
            .monkey-bottom { width: 200px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>403 - Forbidden</h1>
        <p>Sorry, you're not allowed here!</p>
    </div>

    <div class="monkey-container">
        <!-- Monkey Side -->
        <div class="monkey-wrapper">
            <div class="speech-bubble">
                Looks like this primate doesn't think you have clearance to pass. Slip this monkey a secret banana for access.
            </div>
            <div class="monkey-bottom">
                <img src="monkey.svg" alt="Monkey Mascot">
            </div>
        </div>
        
        <!-- Banana Side -->
        <div class="banana-wrapper">
            <button class="banana-button" onclick="window.location.reload();">
                <img src="banana.svg" width="100" height="100" alt="Banana">
                <div class="banana-label">Slip the monkey a banana!</div>
            </button>
        </div>
    </div>

</body>
</html>
